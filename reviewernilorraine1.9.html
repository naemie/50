<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>The Self Mock Test</title>
    <style>
        :root {
            color-scheme: light;
            --ink: #17201b;
            --muted: #5d6b62;
            --line: #d8dfd8;
            --paper: #fbfcf8;
            --panel: #ffffff;
            --mint: #d7f2df;
            --mint-strong: #237548;
            --rose: #ffe1df;
            --rose-strong: #a6342c;
            --gold: #f4c96b;
            --teal: #d8eef0;
            --blue: #2b6574;
            --shadow: 0 18px 50px rgba(23, 32, 27, 0.12);
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            background:
                linear-gradient(135deg, rgba(216, 238, 240, 0.72), rgba(215, 242, 223, 0.58) 46%, rgba(244, 201, 107, 0.2)),
                var(--paper);
            color: var(--ink);
            min-height: 100dvh;
            overflow-x: hidden;
            letter-spacing: 0;
        }

        button,
        input {
            font: inherit;
        }

        button {
            -webkit-tap-highlight-color: transparent;
        }

        .app {
            width: min(1180px, calc(100% - 32px));
            margin: 0 auto;
            padding: 28px 0 44px;
        }

        .topbar {
            display: grid;
            grid-template-columns: minmax(0, 1fr) auto;
            align-items: end;
            gap: 18px;
            padding: 18px 0 22px;
        }

        .topbar>*,
        .layout>* {
            min-width: 0;
        }

        .eyebrow {
            margin: 0 0 6px;
            color: var(--blue);
            font-size: 0.78rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 4rem);
            line-height: 0.95;
            letter-spacing: 0;
        }

        .subline {
            margin: 12px 0 0;
            color: var(--muted);
            max-width: 680px;
            line-height: 1.55;
            overflow-wrap: anywhere;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            justify-content: flex-end;
            gap: 10px;
            min-width: 0;
        }

        .btn {
            border: 1px solid var(--ink);
            background: var(--ink);
            color: white;
            border-radius: 8px;
            padding: 11px 14px;
            min-height: 44px;
            font-weight: 800;
            cursor: pointer;
            box-shadow: 0 8px 0 rgba(23, 32, 27, 0.16);
            transition: transform 140ms ease, box-shadow 140ms ease, background 140ms ease;
            min-width: 0;
            touch-action: manipulation;
        }

        .btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 0 rgba(23, 32, 27, 0.13);
        }

        .btn:active {
            transform: translateY(1px);
            box-shadow: 0 5px 0 rgba(23, 32, 27, 0.16);
        }

        .btn.secondary {
            background: white;
            color: var(--ink);
        }

        .layout {
            display: grid;
            grid-template-columns: minmax(260px, 310px) minmax(0, 1fr);
            gap: 20px;
            align-items: start;
        }

        .status {
            position: sticky;
            top: 18px;
            max-height: calc(100dvh - 36px);
            overflow: auto;
            background: rgba(255, 255, 255, 0.88);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 16px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(14px);
        }

        .score {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 10px;
            margin-bottom: 14px;
        }

        .metric {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px;
            background: var(--panel);
        }

        .metric strong {
            display: block;
            font-size: 1.6rem;
            line-height: 1;
            margin-bottom: 5px;
        }

        .metric span {
            color: var(--muted);
            font-size: 0.85rem;
        }

        .progress {
            height: 12px;
            border: 1px solid var(--line);
            border-radius: 999px;
            overflow: hidden;
            background: #eef3ed;
            margin: 10px 0 14px;
        }

        .progress>div {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--mint-strong), var(--gold));
            transition: width 180ms ease;
        }

        .pillrow {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .pill {
            border: 1px solid var(--line);
            background: #f7faf6;
            color: var(--muted);
            border-radius: 999px;
            padding: 7px 10px;
            font-size: 0.82rem;
            font-weight: 700;
        }

        .result {
            display: none;
            margin-top: 14px;
            padding: 13px;
            border-radius: 8px;
            border: 1px solid var(--line);
            background: var(--teal);
            color: #183a43;
            line-height: 1.45;
            font-weight: 750;
        }

        .result.show {
            display: block;
        }

        .question-nav {
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--line);
        }

        .question-nav-title {
            margin: 0 0 10px;
            color: var(--muted);
            font-size: 0.82rem;
            font-weight: 850;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .question-nav-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 8px;
            max-height: min(380px, calc(100dvh - 350px));
            overflow-y: auto;
            padding-right: 2px;
        }

        .nav-btn {
            display: inline-grid;
            place-items: center;
            aspect-ratio: 1;
            min-height: 42px;
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #ffffff;
            color: var(--muted);
            font-weight: 850;
            cursor: pointer;
            transition: border-color 140ms ease, background 140ms ease, color 140ms ease, transform 140ms ease;
            touch-action: manipulation;
        }

        .nav-btn:hover {
            border-color: var(--blue);
            color: var(--ink);
            transform: translateY(-1px);
        }

        .nav-btn:disabled {
            cursor: not-allowed;
            opacity: 0.42;
            transform: none;
        }

        .nav-btn.answered {
            border-color: var(--mint-strong);
            background: var(--mint);
            color: var(--mint-strong);
        }

        .nav-btn.current {
            border-color: var(--ink);
            box-shadow: inset 0 0 0 2px var(--ink);
            color: var(--ink);
        }

        .quiz-stage {
            display: grid;
            gap: 12px;
            min-width: 0;
            width: 100%;
            scroll-margin-top: 18px;
        }

        .question-list {
            display: grid;
            gap: 14px;
        }

        .question-card {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.94);
            box-shadow: 0 10px 28px rgba(23, 32, 27, 0.08);
            overflow: hidden;
            min-width: 0;
            scroll-margin-top: 18px;
        }

        .question-head {
            display: grid;
            grid-template-columns: auto minmax(0, 1fr);
            gap: 12px;
            align-items: start;
            padding: 18px 18px 10px;
        }

        .number {
            width: 38px;
            height: 38px;
            display: inline-grid;
            place-items: center;
            border-radius: 8px;
            background: var(--ink);
            color: white;
            font-weight: 900;
            flex: 0 0 auto;
        }

        .question-text {
            margin: 3px 0 0;
            font-weight: 850;
            line-height: 1.38;
            overflow-wrap: anywhere;
        }

        .choices {
            display: grid;
            gap: 9px;
            padding: 0 18px 18px;
            min-width: 0;
        }

        .choice {
            display: grid;
            grid-template-columns: 34px minmax(0, 1fr);
            gap: 10px;
            align-items: start;
            width: 100%;
            min-height: 56px;
            min-width: 0;
            text-align: left;
            border: 1px solid var(--line);
            background: #ffffff;
            color: var(--ink);
            border-radius: 8px;
            padding: 13px;
            cursor: pointer;
            transition: border-color 140ms ease, background 140ms ease, transform 140ms ease;
            touch-action: manipulation;
        }

        .choice:hover {
            border-color: var(--blue);
            transform: translateY(-1px);
        }

        .choice.selected {
            border-color: var(--ink);
            background: #f8fbf2;
        }

        .choice.correct {
            border-color: var(--mint-strong);
            background: var(--mint);
        }

        .choice.incorrect.selected {
            border-color: var(--rose-strong);
            background: var(--rose);
        }

        .choice.locked {
            cursor: default;
            transform: none;
        }

        .question-controls {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .question-controls .btn {
            min-width: 150px;
        }

        .btn:disabled {
            cursor: not-allowed;
            opacity: 0.5;
            transform: none;
            box-shadow: none;
        }

        .btn:focus-visible,
        .choice:focus-visible,
        .nav-btn:focus-visible {
            outline: 3px solid rgba(43, 101, 116, 0.35);
            outline-offset: 2px;
        }

        .letter {
            width: 28px;
            height: 28px;
            display: inline-grid;
            place-items: center;
            border: 1px solid var(--line);
            border-radius: 999px;
            color: var(--muted);
            font-weight: 900;
            background: #f8faf7;
        }

        .choice.correct .letter {
            border-color: var(--mint-strong);
            color: var(--mint-strong);
            background: white;
        }

        .choice.incorrect.selected .letter {
            border-color: var(--rose-strong);
            color: var(--rose-strong);
            background: white;
        }

        .choice-text {
            min-width: 0;
            line-height: 1.42;
            font-weight: 690;
            overflow-wrap: anywhere;
        }

        .feedback {
            display: none;
            grid-column: 2;
            color: var(--muted);
            line-height: 1.45;
            font-size: 0.95rem;
            margin-top: 7px;
            padding-top: 8px;
            border-top: 1px solid rgba(93, 107, 98, 0.18);
            overflow-wrap: anywhere;
        }

        .choice.show-feedback .feedback {
            display: block;
        }

        .feedback strong {
            color: var(--ink);
        }

        .empty-warning {
            display: none;
            margin-top: 12px;
            color: var(--rose-strong);
            font-weight: 800;
            line-height: 1.4;
        }

        .empty-warning.show {
            display: block;
        }

        @media (max-width: 860px) {
            .app {
                width: 100%;
                padding: 10px 12px calc(86px + env(safe-area-inset-bottom));
            }

            .topbar {
                grid-template-columns: 1fr;
                gap: 12px;
                padding: 10px 0 12px;
            }

            .eyebrow {
                font-size: 0.72rem;
            }

            h1 {
                font-size: clamp(1.65rem, 8vw, 2.45rem);
                line-height: 1;
            }

            .subline {
                margin-top: 8px;
                font-size: 0.95rem;
            }

            .layout {
                grid-template-columns: 1fr;
                gap: 12px;
            }

            .toolbar {
                display: flex;
                justify-content: normal;
                gap: 8px;
                width: 100%;
            }

            .btn {
                width: auto;
                min-height: 48px;
                padding: 11px 10px;
                box-shadow: 0 5px 0 rgba(23, 32, 27, 0.14);
            }

            .toolbar .btn {
                flex: 1 1 0;
                min-width: 0;
            }

            .status {
                position: sticky;
                top: 0;
                z-index: 20;
                max-height: none;
                overflow: visible;
                margin: 0 -12px;
                padding: 10px 12px 12px;
                border-left: 0;
                border-right: 0;
                border-radius: 0 0 8px 8px;
                background: rgba(255, 255, 255, 0.94);
            }

            .score {
                gap: 8px;
                margin-bottom: 8px;
            }

            .metric {
                padding: 8px 10px;
            }

            .metric strong {
                font-size: 1.25rem;
            }

            .metric span {
                font-size: 0.78rem;
            }

            .progress {
                height: 10px;
                margin: 8px 0 10px;
            }

            .pillrow {
                gap: 6px;
            }

            .pill {
                padding: 5px 8px;
                font-size: 0.76rem;
            }

            .result {
                margin-top: 10px;
                padding: 10px;
            }

            .empty-warning {
                margin-top: 8px;
                font-size: 0.85rem;
            }

            .question-nav {
                margin-top: 10px;
                padding-top: 10px;
            }

            .question-nav-title {
                margin-bottom: 7px;
                font-size: 0.72rem;
            }

            .question-nav-grid {
                display: flex;
                gap: 7px;
                max-height: none;
                overflow-x: auto;
                overflow-y: hidden;
                padding: 0 2px 4px;
                scroll-snap-type: x proximity;
                -webkit-overflow-scrolling: touch;
            }

            .nav-btn {
                flex: 0 0 40px;
                width: 40px;
                min-height: 40px;
                scroll-snap-align: center;
            }

            .quiz-stage {
                gap: 10px;
                scroll-margin-top: 168px;
            }

            .question-card {
                box-shadow: 0 8px 22px rgba(23, 32, 27, 0.08);
            }

            .question-head {
                padding: 15px 14px 9px;
            }

            .choices {
                gap: 8px;
                padding: 0 14px 14px;
            }

            .choice {
                padding: 12px 10px;
            }

            .question-controls {
                position: sticky;
                bottom: 0;
                z-index: 15;
                display: flex;
                gap: 8px;
                width: 100%;
                margin: 0;
                padding: 10px 0 calc(10px + env(safe-area-inset-bottom));
                background: linear-gradient(180deg, rgba(251, 252, 248, 0), rgba(251, 252, 248, 0.96) 24%, var(--paper));
                backdrop-filter: blur(12px);
            }

            .question-controls .btn {
                flex: 1 1 0;
                min-width: 0;
            }
        }

        @media (max-width: 520px) {
            .app {
                padding-left: 10px;
                padding-right: 10px;
            }

            .status {
                margin-right: -10px;
                margin-left: -10px;
                padding-right: 10px;
                padding-left: 10px;
            }

            .question-head {
                grid-template-columns: auto minmax(0, 1fr);
                gap: 10px;
            }

            .number {
                width: 34px;
                height: 34px;
            }

            .question-text {
                font-size: 1rem;
            }

            .choice {
                grid-template-columns: 30px minmax(0, 1fr);
            }

            .feedback {
                grid-column: 1 / -1;
                font-size: 0.9rem;
            }

            .question-controls {
                margin-right: 0;
                margin-left: 0;
            }
        }

        @media (max-width: 360px) {
            .btn {
                font-size: 0.92rem;
            }

            .nav-btn {
                flex-basis: 38px;
                width: 38px;
                min-height: 38px;
            }
        }

        @media (hover: none) {
            .btn:hover,
            .choice:hover,
            .nav-btn:hover {
                transform: none;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            html {
                scroll-behavior: auto;
            }

            *,
            *::before,
            *::after {
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

<body>
    <main class="app">
        <header class="topbar">
            <div>
                <p class="eyebrow">50-item multiple choice</p>
                <h1>The Self Mock Test</h1>
                <p class="subline">Sociological, anthropological, and Eastern-Western views of the self.</p>
            </div>
            <div class="toolbar" aria-label="Quiz actions">
                <button class="btn secondary" id="retakeBtn" type="button">New Attempt</button>
                <button class="btn" id="checkBtn" type="button">Check Answers</button>
            </div>
        </header>

        <section class="layout">
            <aside class="status" aria-label="Test status">
                <div class="score">
                    <div class="metric">
                        <strong id="answeredCount">0</strong>
                        <span>Answered</span>
                    </div>
                    <div class="metric">
                        <strong id="scoreCount">--</strong>
                        <span>Score</span>
                    </div>
                </div>
                <div class="progress" aria-hidden="true">
                    <div id="progressBar"></div>
                </div>
                <div class="pillrow">
                    <span class="pill" id="itemCount">50 items</span>
                    <span class="pill" id="statePill">In progress</span>
                </div>
                <div class="result" id="resultBox"></div>
                <div class="empty-warning" id="warningBox">Some items are unanswered. They will be counted as incorrect
                    when checked.</div>
                <nav class="question-nav" aria-label="Question navigation">
                    <p class="question-nav-title">Questions</p>
                    <div class="question-nav-grid" id="questionNav"></div>
                </nav>
            </aside>

            <div class="quiz-stage">
                <section class="question-list" id="questionList" aria-live="polite"></section>
                <div class="question-controls" aria-label="Question controls">
                    <button class="btn secondary" id="prevQuestionBtn" type="button">Previous</button>
                    <button class="btn" id="nextQuestionBtn" type="button">Next Question</button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const quizItems = [
            {
                id: "q01",
                question: "Which statement best defines sociology?",
                choices: [
                    {
                        text: "The study of human behavior, including social behavior, society, social relationships, social interaction, and culture.",
                        correct: true,
                        feedback: "Correct. Sociology is described as the study of human behavior, with attention to social behavior, society, patterns of social relationships, social interaction, and the culture around everyday life."
                    },
                    {
                        text: "The interpretation of human behavior based on material remains through time.",
                        correct: false,
                        feedback: "Incorrect. This describes archeology, which interprets human behavior through material remains. Sociology focuses on human behavior in society and social interaction."
                    },
                    {
                        text: "The study of biological and behavioral aspects of humans, ancestors, and non-human primates.",
                        correct: false,
                        feedback: "Incorrect. This describes biological or physical anthropology. Sociology centers on social behavior, society, social relationships, interaction, and culture."
                    },
                    {
                        text: "The study of human languages and their social and cultural contexts across time.",
                        correct: false,
                        feedback: "Incorrect. This describes linguistic anthropology. Sociology is broader here: it studies human behavior, especially social behavior and everyday social life."
                    }
                ]
            },
            {
                id: "q02",
                question: "In the looking-glass self, how is self-understanding constructed?",
                choices: [
                    {
                        text: "Through a person's perception of how others view them.",
                        correct: true,
                        feedback: "Correct. The looking-glass self explains that self-understanding is constructed partly from a person's perception of how others see and judge them."
                    },
                    {
                        text: "Through biological needs and instincts alone.",
                        correct: false,
                        feedback: "Incorrect. Reducing human culture only to biological needs and instincts is given as an example of reductionism, not the looking-glass self."
                    },
                    {
                        text: "Through material remains left behind through time.",
                        correct: false,
                        feedback: "Incorrect. Material remains are connected with archeology. The looking-glass self depends on imagined appearance, interpreted judgment, and feelings based on others' views."
                    },
                    {
                        text: "Through refusing all social expectations and acting only spontaneously.",
                        correct: false,
                        feedback: "Incorrect. Spontaneity is linked with Mead's \"I.\" Cooley's looking-glass self focuses on how we imagine and interpret the judgments of others."
                    }
                ]
            },
            {
                id: "q03",
                question: "Which sequence best matches the looking-glass self process?",
                choices: [
                    {
                        text: "Imagine how we appear, interpret others' judgment, feel pride or shame, then respond based on that interpretation.",
                        correct: true,
                        feedback: "Correct. The process begins with imagining appearance, moves to interpreting others' judgment, produces pride or shame, and leads to a response based on that interpretation."
                    },
                    {
                        text: "Learn language, play, and games, then develop the self through social activities.",
                        correct: false,
                        feedback: "Incorrect. Language, play, and games are Mead's activities for developing the self. The looking-glass self specifically uses imagined appearance and judgment."
                    },
                    {
                        text: "Take on roles, act them out, and present a favorable impression to an audience.",
                        correct: false,
                        feedback: "Incorrect. That describes dramaturgy. The looking-glass self is about imagined appearance, interpreted judgment, pride or shame, and response."
                    },
                    {
                        text: "Focus on personal autonomy, fulfill personal needs, and express oneself.",
                        correct: false,
                        feedback: "Incorrect. This describes the independent self-view. The looking-glass self concerns the perceived view and judgment of others."
                    }
                ]
            },
            {
                id: "q04",
                question: "According to Mead, how is the social self developed?",
                choices: [
                    {
                        text: "Over time from social experiences and activities.",
                        correct: true,
                        feedback: "Correct. Mead's theory says the self develops over time from social experiences and social activities."
                    },
                    {
                        text: "At birth as a fixed part of the body.",
                        correct: false,
                        feedback: "Incorrect. The self is described as emerging from social experience; it is not part of the body and does not exist at birth."
                    },
                    {
                        text: "By stacking physical, biological, psychological, and social models without interrelation.",
                        correct: false,
                        feedback: "Incorrect. That is the stratigraphic approach, a pitfall to avoid. Mead connects development of the self with social experiences and activities."
                    },
                    {
                        text: "By treating another culture as superior to one's own culture.",
                        correct: false,
                        feedback: "Incorrect. Thinking another culture is superior to one's own is xenocentrism. Mead's self develops through social experience and activity."
                    }
                ]
            },
            {
                id: "q05",
                question: "Which three activities develop the self in Mead's theory?",
                choices: [
                    {
                        text: "Language, play, and games.",
                        correct: true,
                        feedback: "Correct. Mead identifies language, play, and games as the three activities that develop the self."
                    },
                    {
                        text: "Archeology, cultural anthropology, and linguistic anthropology.",
                        correct: false,
                        feedback: "Incorrect. These are anthropology subdisciplines. Mead's listed activities are language, play, and games."
                    },
                    {
                        text: "Interaction order, dramaturgy, and impression management.",
                        correct: false,
                        feedback: "Incorrect. These are Goffman-related ideas. Mead's activities for self-development are language, play, and games."
                    },
                    {
                        text: "Form, sensation, and perception.",
                        correct: false,
                        feedback: "Incorrect. These are among Buddhism's aggregates of existence. Mead names language, play, and games."
                    }
                ]
            },
            {
                id: "q06",
                question: "What does Mead's \"Me\" refer to?",
                choices: [
                    {
                        text: "The socialized aspect made up of learned behaviors, attitudes, and expectations of others and society.",
                        correct: true,
                        feedback: "Correct. The \"Me\" is the socialized side of the self: learned behaviors, attitudes, and expectations from others and society."
                    },
                    {
                        text: "The spontaneous, creative, and unpredictable aspect that reacts to social expectations.",
                        correct: false,
                        feedback: "Incorrect. This describes Mead's \"I.\" The \"Me\" is the learned and socialized aspect of the self."
                    },
                    {
                        text: "The self that is defined by significant relationships and community status.",
                        correct: false,
                        feedback: "Incorrect. This matches Confucian relational identity. Mead's \"Me\" is the socialized aspect learned from society."
                    },
                    {
                        text: "The self seen as an illusion born out of ignorance and attempts to hold or control things.",

        const questionList = document.querySelector("#questionList");
        const quizStage = document.querySelector(".quiz-stage");
        const answeredCount = document.querySelector("#answeredCount");
        const scoreCount = document.querySelector("#scoreCount");
        const progressBar = document.querySelector("#progressBar");
        const statePill = document.querySelector("#statePill");
        const resultBox = document.querySelector("#resultBox");
        const warningBox = document.querySelector("#warningBox");
        const questionNav = document.querySelector("#questionNav");
        const checkBtn = document.querySelector("#checkBtn");
        const retakeBtn = document.querySelector("#retakeBtn");
        const prevQuestionBtn = document.querySelector("#prevQuestionBtn");
        const nextQuestionBtn = document.querySelector("#nextQuestionBtn");
        const letters = ["A", "B", "C", "D"];
        let attempt = [];
        let selected = {};
        let checked = false;
        let currentQuestionId = "";

        function shuffle(items) {
            const copy = [...items];
            for (let i = copy.length - 1; i > 0; i -= 1) {
                const j = Math.floor(Math.random() * (i + 1));
                [copy[i], copy[j]] = [copy[j], copy[i]];
            }
            return copy;
        }

        function buildAttempt() {
            attempt = shuffle(quizItems).map((item) => ({
                ...item,
                choices: shuffle(item.choices).map((choice, index) => ({
                    ...choice,
                    key: `${item.id}-${index}-${choice.text.slice(0, 12)}`
                }))
            }));
            selected = {};
            checked = false;
            currentQuestionId = attempt[0]?.id || "";
            scoreCount.textContent = "--";
            statePill.textContent = "In progress";
            resultBox.classList.remove("show");
            warningBox.classList.remove("show");
            checkBtn.disabled = false;
            render();
            updateStatus();
            window.scrollTo({ top: 0, behavior: "smooth" });
        }

        function getCurrentQuestionIndex() {
            const currentIndex = attempt.findIndex((item) => item.id === currentQuestionId);
            return currentIndex >= 0 ? currentIndex : 0;
        }

        function getFirstOpenQuestionIndex() {
            const firstOpenIndex = attempt.findIndex((item) => !selected[item.id]);
            return firstOpenIndex >= 0 ? firstOpenIndex : attempt.length;
        }

        function canVisitQuestion(questionIndex) {
            if (checked) {
                return true;
            }
            const item = attempt[questionIndex];
            if (!item) {
                return false;
            }
            return Boolean(selected[item.id]) || questionIndex <= getFirstOpenQuestionIndex();
        }

        function goToQuestion(questionIndex, shouldScroll = false) {
            if (!canVisitQuestion(questionIndex)) {
                return;
            }
            currentQuestionId = attempt[questionIndex].id;
            render();
            updateStatus();
            if (shouldScroll) {
                quizStage.scrollIntoView({ behavior: "smooth", block: "start" });
            }
        }

        function render() {
            questionList.innerHTML = "";
            const questionIndex = getCurrentQuestionIndex();
            const item = attempt[questionIndex];
            if (!item) {
                renderQuestionNav();
                updateQuestionControls();
                return;
            }

            const hasSelection = Boolean(selected[item.id]);
            const card = document.createElement("article");
            card.className = `question-card${hasSelection ? " answered" : ""}${checked ? " checked" : ""}`;
            card.dataset.questionId = item.id;
            card.id = `question-${item.id}`;

            const head = document.createElement("div");
            head.className = "question-head";
            head.innerHTML = `
          <div class="number">${questionIndex + 1}</div>
          <p class="question-text">${item.question}</p>
        `;

            const choices = document.createElement("div");
            choices.className = "choices";

            item.choices.forEach((choice, choiceIndex) => {
                const button = document.createElement("button");
                const isSelected = selected[item.id] === choice.key;
                const isChoiceLocked = checked || hasSelection;
                const shouldRevealChoice = checked || isSelected;
                const shouldShowCorrect = checked || hasSelection;
                const correctnessClass = shouldShowCorrect && choice.correct ? " correct" : "";
                const selectedWrongClass = hasSelection && isSelected && !choice.correct ? " incorrect" : "";
                const feedbackClass = shouldRevealChoice ? " show-feedback" : "";
                button.type = "button";
                button.className = `choice${isSelected ? " selected" : ""}${correctnessClass}${selectedWrongClass}${feedbackClass}${isChoiceLocked ? " locked" : ""}`;
                button.disabled = isChoiceLocked;
                button.dataset.questionId = item.id;
                button.dataset.choiceKey = choice.key;
                button.innerHTML = `
            <span class="letter">${letters[choiceIndex]}</span>
            <span class="choice-text">${choice.text}</span>
            <span class="feedback"><strong>${choice.correct ? "Correct." : "Incorrect."}</strong> ${choice.feedback.replace(/^(Correct|Incorrect)\.\s*/, "")}</span>
          `;
                button.addEventListener("click", () => {
                    selected[item.id] = choice.key;
                    currentQuestionId = item.id;
                    warningBox.classList.remove("show");
                    render();
                    updateStatus();
                });
                choices.appendChild(button);
            });

            card.append(head, choices);
            questionList.appendChild(card);
            renderQuestionNav();
            updateQuestionControls();
        }

        function renderQuestionNav() {
            questionNav.innerHTML = "";
            attempt.forEach((item, questionIndex) => {
                const button = document.createElement("button");
                const isCurrent = currentQuestionId === item.id;
                const isLocked = !canVisitQuestion(questionIndex);
                button.type = "button";
                button.className = `nav-btn${selected[item.id] ? " answered" : ""}${isCurrent ? " current" : ""}`;
                button.disabled = isLocked;
                button.textContent = questionIndex + 1;
                button.setAttribute("aria-label", `Go to question ${questionIndex + 1}`);
                if (isCurrent) {
                    button.setAttribute("aria-current", "true");
                }
                button.addEventListener("click", () => {
                    goToQuestion(questionIndex, true);
                });
                questionNav.appendChild(button);
            });
            syncActiveQuestionNav();
        }

        function syncActiveQuestionNav() {
            const activeButton = questionNav.querySelector(".nav-btn.current");
            activeButton?.scrollIntoView({
                behavior: "smooth",
                block: "nearest",
                inline: "center"
            });
        }

        function updateQuestionControls() {
            const currentIndex = getCurrentQuestionIndex();
            const currentItem = attempt[currentIndex];
            const hasSelection = currentItem ? Boolean(selected[currentItem.id]) : false;
            const nextIndex = currentIndex + 1;
            const isLastQuestion = nextIndex >= attempt.length;
            const allAnswered = Object.keys(selected).length >= attempt.length;
            prevQuestionBtn.disabled = currentIndex <= 0;
            if (isLastQuestion) {
                nextQuestionBtn.disabled = checked || !allAnswered;
                nextQuestionBtn.textContent = checked ? "Checked" : "Check Answers";
            } else {
                nextQuestionBtn.disabled = !checked && !hasSelection;
                nextQuestionBtn.textContent = "Next Question";
            }
        }

        function selectCurrentChoice(choiceIndex) {
            const currentItem = attempt[getCurrentQuestionIndex()];
            if (!currentItem || checked || selected[currentItem.id]) {
                return;
            }
            const choice = currentItem.choices[choiceIndex];
            if (!choice) {
                return;
            }
            selected[currentItem.id] = choice.key;
            currentQuestionId = currentItem.id;
            warningBox.classList.remove("show");
            render();
            updateStatus();
        }

        function handleNextQuestion() {
            const nextIndex = getCurrentQuestionIndex() + 1;
            if (nextIndex >= attempt.length) {
                checkAnswers();
                return;
            }
            goToQuestion(nextIndex, true);
        }

        function updateStatus() {
            const answered = Object.keys(selected).length;
            answeredCount.textContent = answered;
            progressBar.style.width = `${(answered / quizItems.length) * 100}%`;
            if (!checked && answered < quizItems.length) {
                statePill.textContent = "In progress";
            } else if (!checked) {
                statePill.textContent = "Ready to check";
            }
        }

        function checkAnswers() {
            const answered = Object.keys(selected).length;
            if (answered < quizItems.length) {
                warningBox.classList.add("show");
            }

            let score = 0;
            attempt.forEach((item) => {
                const chosen = item.choices.find((choice) => choice.key === selected[item.id]);
                if (chosen && chosen.correct) {
                    score += 1;
                }
            });

            checked = true;
            scoreCount.textContent = score;
            statePill.textContent = "Checked";
            resultBox.textContent = `Score: ${score} out of ${quizItems.length}`;
            resultBox.classList.add("show");
            render();
            updateStatus();
            resultBox.scrollIntoView({ behavior: "smooth", block: "center" });
        }

        checkBtn.addEventListener("click", checkAnswers);
        retakeBtn.addEventListener("click", buildAttempt);
        prevQuestionBtn.addEventListener("click", () => {
            goToQuestion(getCurrentQuestionIndex() - 1, true);
        });
        nextQuestionBtn.addEventListener("click", handleNextQuestion);
        document.addEventListener("keydown", (event) => {
            const activeTag = document.activeElement?.tagName;
            const isTyping = ["INPUT", "SELECT", "TEXTAREA"].includes(activeTag);
            if (isTyping || event.altKey || event.ctrlKey || event.metaKey) {
                return;
            }
            if (/^[1-4]$/.test(event.key)) {
                event.preventDefault();
                selectCurrentChoice(Number(event.key) - 1);
            } else if (event.key === "ArrowLeft" && !prevQuestionBtn.disabled) {
                event.preventDefault();
                goToQuestion(getCurrentQuestionIndex() - 1, true);
            } else if (event.key === "ArrowRight" && !nextQuestionBtn.disabled) {
                event.preventDefault();
                handleNextQuestion();
            }
        });

        document.querySelector("#itemCount").textContent = `${quizItems.length} items`;
        buildAttempt();
    </script>
</body>

</html>
